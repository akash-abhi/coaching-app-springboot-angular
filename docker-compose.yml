version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0-debian
    container_name: coaching_app_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: coaching_app
      MYSQL_USER: coaching_user
      MYSQL_PASSWORD: coaching_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - coaching_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: coaching_app_redis
    ports:
      - "6379:6379"
    networks:
      - coaching_network
    volumes:
      - redis_data:/data

  # SpringBoot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coaching_app_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/coaching_app
      SPRING_DATASOURCE_USERNAME: coaching_user
      SPRING_DATASOURCE_PASSWORD: coaching_pass123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - coaching_network
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coaching_app_frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - coaching_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  backend_uploads:

networks:
  coaching_network:
    driver: bridge
